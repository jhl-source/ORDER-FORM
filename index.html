<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팝업스토어 주문 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #FAF9F6;
      --bg2: #F0EEE9;
      --surface: #FFFFFF;
      --border: #E5E1D8;
      --text: #1A1A1A;
      --text2: #6B6560;
      --text3: #A09890;
      --accent: #C8452A;
      --accent-light: #F7EBE8;
      --green: #2E7D52;
      --green-bg: #E8F5EE;
      --amber: #A06A10;
      --amber-bg: #FBF3E3;
      --red: #B03020;
      --red-bg: #FAEAE8;
      --gray: #9E9890;
      --gray-bg: #EEECE8;
      --radius: 14px;
      --radius-sm: 9px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
      --font: 'Noto Sans KR', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── NAV ── */
    #admin-nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 60px;
    }
    #admin-nav.hidden { display: none; }
    .nav-brand { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      padding: 7px 16px; border-radius: var(--radius-sm); text-decoration: none;
      color: var(--text2); font-size: 14px; font-weight: 500; transition: all 0.15s;
    }
    .nav-links a:hover { background: var(--bg2); color: var(--text); }
    .nav-links a.active { background: var(--accent-light); color: var(--accent); }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── LAYOUT ── */
    .container { max-width: 760px; margin: 0 auto; padding: 32px 20px; }
    .container.wide { max-width: 1100px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .page-header p { color: var(--text2); margin-top: 6px; font-size: 14px; }

    /* ── CARD ── */
    .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 20px; border-radius: var(--radius-sm); font-family: var(--font);
      font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }
    .btn-secondary { background: var(--bg2); color: var(--text); }
    .btn-secondary:hover { background: var(--border); }
    .btn-ghost { background: transparent; color: var(--text2); }
    .btn-ghost:hover { background: var(--bg2); }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-full { width: 100%; }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-family: var(--font); font-size: 15px;
      color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }

    /* ── BADGE ── */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-amber { background: var(--amber-bg); color: var(--amber); }
    .badge-red   { background: var(--red-bg);   color: var(--red); }
    .badge-gray  { background: var(--gray-bg);  color: var(--gray); }

    /* ── STOCK BAR ── */
    .stock-bar-wrap { height: 7px; background: var(--bg2); border-radius: 100px; overflow: hidden; margin-top: 10px; }
    .stock-bar-fill { height: 100%; border-radius: 100px; transition: width 0.6s ease; }
    .stock-bar-fill.high   { background: var(--green); }
    .stock-bar-fill.medium { background: var(--amber); }
    .stock-bar-fill.low    { background: var(--red); }
    .stock-bar-fill.out    { background: var(--gray); width: 0 !important; }

    /* ── ORDER VIEW ── */
    .order-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 22px 24px; text-align: center; }
    .order-header .brand { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .order-header .subtitle { font-size: 14px; color: var(--text2); margin-top: 4px; }
    .product-list { display: flex; flex-direction: column; gap: 12px; }
    .product-card {
      background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 16px 20px; display: flex; align-items: center; gap: 16px;
    }
    .product-card.sold-out { opacity: 0.5; }
    .product-info { flex: 1; }
    .product-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .product-variant { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .product-price { font-size: 15px; font-weight: 700; color: var(--accent); margin-top: 6px; }
    .qty-stepper { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; }
    .qty-btn {
      width: 38px; height: 38px; border: none; background: var(--bg2); cursor: pointer;
      font-size: 18px; color: var(--text); transition: background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:hover { background: var(--border); }
    .qty-btn:disabled { opacity: 0.3; cursor: not-allowed; background: var(--bg2); }
    .qty-display { width: 44px; text-align: center; font-size: 15px; font-weight: 700; background: white; color: var(--text); }
    .cart-summary { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 20px; }
    .cart-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
    .cart-item { display: flex; justify-content: space-between; padding: 7px 0; font-size: 14px; border-bottom: 1px solid var(--bg2); }
    .cart-item:last-child { border-bottom: none; }
    .cart-total { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; margin-top: 4px; border-top: 1.5px solid var(--border); font-weight: 700; font-size: 16px; }
    .cart-total .total-amount { color: var(--accent); font-size: 19px; }
    .customer-form { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 14px; }
    .success-screen { text-align: center; padding: 64px 20px; }
    .success-icon { width: 80px; height: 80px; background: var(--green-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 24px; }
    .success-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .success-subtitle { color: var(--text2); margin-top: 8px; font-size: 15px; }
    .order-receipt { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: left; margin-top: 24px; }

    /* ── DASHBOARD ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
    .stat-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 30px; font-weight: 700; letter-spacing: -1px; margin-top: 8px; }
    .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .dp-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; transition: all 0.3s; }
    .dp-card.sold-out { opacity: 0.55; border-style: dashed; }
    .dp-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .dp-variant { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .dp-stock-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 16px; }
    .dp-stock-num { font-size: 34px; font-weight: 700; letter-spacing: -1px; }
    .dp-stock-initial { font-size: 13px; color: var(--text3); }
    .realtime-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── ORDERS ── */
    .orders-list { display: flex; flex-direction: column; gap: 12px; }
    .order-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .order-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .order-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
    .order-customer { font-weight: 700; font-size: 15px; }
    .order-item-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; color: var(--text2); border-bottom: 1px solid var(--bg2); }
    .order-item-row:last-child { border-bottom: none; }
    .order-total-row { display: flex; justify-content: space-between; padding-top: 12px; margin-top: 4px; border-top: 1.5px solid var(--border); font-weight: 700; font-size: 15px; }

    /* ── INVENTORY ── */
    .inv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .product-table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .product-table th { background: var(--bg2); padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; }
    .product-table td { padding: 14px 16px; border-top: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    .product-table tr:hover td { background: var(--bg); }
    .stock-edit { width: 80px; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font); font-size: 14px; text-align: center; outline: none; transition: border-color 0.15s; }
    .stock-edit:focus { border-color: var(--accent); }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 100px; transition: 0.2s; }
    .toggle-slider::before { content:''; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .toggle-slider { background: var(--green); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.48); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(3px); }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--surface); border-radius: var(--radius); padding: 32px; width: 90%; max-width: 440px; box-shadow: var(--shadow-lg); }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.5px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .pin-row { display: flex; gap: 12px; justify-content: center; margin: 24px 0; }
    .pin-digit { width: 56px; height: 64px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 26px; font-weight: 700; text-align: center; font-family: var(--font); outline: none; transition: border-color 0.15s; }
    .pin-digit:focus { border-color: var(--accent); }
    .pin-error { color: var(--red); font-size: 13px; text-align: center; min-height: 20px; }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--text); color: white; padding: 12px 26px; border-radius: 100px; font-size: 14px; font-weight: 500; z-index: 9999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--green); }
    #toast.error { background: var(--red); }

    /* ── STATES ── */
    .loading-state { text-align: center; padding: 64px 20px; color: var(--text2); }
    .spinner { width: 30px; height: 30px; border: 3px solid var(--bg2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 64px 20px; color: var(--text3); }
    .empty-state .icon { font-size: 44px; margin-bottom: 14px; }

    /* ── UTILS ── */
    .flex { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .items-center { align-items: center; }
    .gap-8 { gap: 8px; }
    .gap-6 { gap: 6px; }
    .mt-4  { margin-top: 4px; }
    .mt-8  { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .text-muted { color: var(--text2); font-size: 14px; }
    .font-bold { font-weight: 700; }
    .text-accent { color: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .products-grid { grid-template-columns: 1fr 1fr; }
      .container { padding: 20px 16px; }
      .product-table { display: block; overflow-x: auto; }
      .nav-links a { padding: 7px 10px; font-size: 13px; }
      #admin-nav { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- Admin Nav -->
<nav id="admin-nav">
  <div class="nav-brand" id="nav-brand">likalika</div>
  <div class="nav-links">
    <a href="#dashboard" id="nav-dashboard">📊 재고현황</a>
    <a href="#orders"    id="nav-orders">📋 주문내역</a>
    <a href="#inventory" id="nav-inventory">⚙️ 재고관리</a>
  </div>
</nav>

<!-- ── ORDER VIEW ── -->
<div id="view-order" class="view">
  <div class="order-header">
    <div class="brand"    id="order-brand">likalika</div>
    <div class="subtitle" id="order-subtitle">팝업스토어 사전주문</div>
  </div>
  <div class="container">
    <div id="order-content">
      <div class="loading-state"><div class="spinner"></div><div>로딩 중...</div></div>
    </div>
  </div>
</div>

<!-- ── DASHBOARD VIEW ── -->
<div id="view-dashboard" class="view">
  <div class="container wide">
    <div class="page-header flex-between">
      <h1>실시간 재고 현황</h1>
      <div class="flex items-center gap-8 text-muted">
        <span class="realtime-dot"></span>
        <span id="last-updated" style="font-size:13px">연결 중...</span>
      </div>
    </div>
    <div id="dashboard-stats"    class="stats-grid"></div>
    <div id="dashboard-products" class="products-grid">
      <div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div><div>로딩 중...</div></div>
    </div>
  </div>
</div>

<!-- ── ORDERS VIEW ── -->
<div id="view-orders" class="view">
  <div class="container wide">
    <div class="page-header flex-between">
      <div>
        <h1>주문 내역</h1>
        <p id="orders-count-text">전체 주문</p>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="loadOrders()">↻ 새로고침</button>
    </div>
    <div id="orders-content">
      <div class="loading-state"><div class="spinner"></div><div>로딩 중...</div></div>
    </div>
  </div>
</div>

<!-- ── INVENTORY VIEW ── -->
<div id="view-inventory" class="view">
  <div class="container wide">
    <div class="inv-header">
      <div class="page-header" style="margin-bottom:0">
        <h1>재고 관리</h1>
        <p>상품 등록 및 재고 수량 조정</p>
      </div>
      <div class="flex gap-8">
        <label class="btn btn-secondary btn-sm" style="cursor:pointer">
          📂 엑셀 업로드
          <input type="file" accept=".xlsx" style="display:none" onchange="handleExcelUpload(this)">
        </label>
        <button class="btn btn-primary btn-sm" onclick="openProductModal()">+ 상품 추가</button>
      </div>
    </div>
    <div style="margin-bottom:16px">
      <input class="form-input" id="inventory-search" type="text"
        placeholder="🔍 상품명, 옵션, 바코드로 검색..."
        oninput="filterInventory(this.value)"
        style="max-width:400px; font-size:14px; padding:9px 14px">
    </div>
    <!-- 업로드 미리보기 패널 -->
    <div id="upload-preview" style="display:none; margin-bottom:20px;">
      <div class="card" style="border:1.5px solid var(--accent); padding:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
          <div>
            <div style="font-weight:700; font-size:15px;">📋 업로드 미리보기</div>
            <div id="upload-count" style="font-size:13px; color:var(--text2); margin-top:3px;"></div>
          </div>
          <div class="flex gap-8">
            <button class="btn btn-secondary btn-sm" onclick="cancelUpload()">취소</button>
            <button class="btn btn-primary btn-sm" onclick="confirmUpload()">✓ Supabase에 등록</button>
          </div>
        </div>
        <div style="overflow-x:auto; max-height:320px; overflow-y:auto;">
          <table class="product-table" id="upload-table">
            <thead><tr>
              <th>상품명</th><th>옵션</th><th>판매가</th><th>재고</th>
            </tr></thead>
            <tbody id="upload-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="inventory-content">
      <div class="loading-state"><div class="spinner"></div><div>로딩 중...</div></div>
    </div>
  </div>
</div>

<!-- ── PIN MODAL ── -->
<div id="pin-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title">🔐 관리자 확인</div>
    <p class="text-muted">PIN 4자리를 입력하세요</p>
    <div class="pin-row">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="pin-0">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="pin-1">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="pin-2">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="pin-3">
    </div>
    <p class="pin-error" id="pin-error"></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closePinModal()">취소</button>
      <button class="btn btn-primary"   onclick="submitPin()">확인</button>
    </div>
  </div>
</div>

<!-- ── PRODUCT MODAL ── -->
<div id="product-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title" id="pmodal-title">상품 추가</div>
    <input type="hidden" id="pmodal-id">
    <div class="form-group">
      <label class="form-label">상품명 *</label>
      <input class="form-input" id="pmodal-name" type="text" placeholder="예: 쿠션 캐리어백">
    </div>
    <div class="form-group">
      <label class="form-label">옵션 (컬러·사이즈 등)</label>
      <input class="form-input" id="pmodal-variant" type="text" placeholder="예: 베이지 / M">
    </div>
    <div class="form-group">
      <label class="form-label">판매가 (원) *</label>
      <input class="form-input" id="pmodal-price" type="number" min="0" placeholder="예: 35000">
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label class="form-label">재고 수량 *</label>
      <input class="form-input" id="pmodal-stock" type="number" min="0" placeholder="예: 50">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeProductModal()">취소</button>
      <button class="btn btn-primary"   onclick="saveProduct()">저장</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ================================================================
// ⚙️  설정 — 이 부분만 수정하면 됩니다
// ================================================================

// ── Utils ──────────────────────────────────────────────
function krw(n)   { return (n||0).toLocaleString('ko-KR') + '원'; }
function fmtTime(d) {
  return new Date(d).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
}
function stockClass(stock, initial) {
  if (stock <= 0) return 'out';
  const r = initial > 0 ? stock / initial : 1;
  return r > 0.5 ? 'high' : r > 0.2 ? 'medium' : 'low';
}
function stockBadge(stock, initial) {
  if (stock <= 0) return '<span class="badge badge-gray">품절</span>';
  const r = initial > 0 ? stock / initial : 1;
  if (r > 0.5) return '<span class="badge badge-green">재고 충분</span>';
  if (r > 0.2) return '<span class="badge badge-amber">소량 남음</span>';
  return '<span class="badge badge-red">마감 임박</span>';
}
function stockColor(cls) {
  return {high:'var(--green)',medium:'var(--amber)',low:'var(--red)',out:'var(--gray)'}[cls];
}

let toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast', 3200);
}

function clearChannels() {
  S.channels.forEach(ch => { try { sb.removeChannel(ch); } catch(e){} });
  S.channels = [];

function showPinModal(cb) {
  S.pinCb = cb;
  document.getElementById('pin-error').textContent = '';
  [0,1,2,3].forEach(i => document.getElementById('pin-'+i).value = '');
  document.getElementById('pin-modal').classList.remove('hidden');
  document.getElementById('pin-0').focus();
}
function closePinModal() {
  document.getElementById('pin-modal').classList.add('hidden');
  window.location.hash = '#dashboard';
}
function submitPin() {
  const pin = [0,1,2,3].map(i => document.getElementById('pin-'+i).value).join('');
  if (pin === CONFIG.adminPin) {
    S.pinVerified = true;
    sessionStorage.setItem('pinOK','1');
    document.getElementById('pin-modal').classList.add('hidden');
    if (S.pinCb) S.pinCb();
  } else {
    document.getElementById('pin-error').textContent = '잘못된 PIN입니다';
    [0,1,2,3].forEach(i => document.getElementById('pin-'+i).value = '');
    document.getElementById('pin-0').focus();
  }
}
[0,1,2,3].forEach(i => {
  document.getElementById('pin-'+i).addEventListener('input', e => {
    if (e.target.value) {
      if (i < 3) document.getElementById('pin-'+(i+1)).focus();
      else submitPin();
    }
  });
  document.getElementById('pin-'+i).addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !e.target.value && i > 0)
      document.getElementById('pin-'+(i-1)).focus();
  });
});

// ── Router ────────────────────────────────────────────
const PROTECTED = ['orders','inventory'];

function navigate(view) {
  clearChannels();
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));

  const isAdmin = view !== 'order';
  document.getElementById('admin-nav').classList.toggle('hidden', !isAdmin);
  document.getElementById('view-' + view)?.classList.add('active');
  document.getElementById('nav-' + view)?.classList.add('active');

  if (view === 'order')     loadOrderView();
  if (view === 'dashboard') loadDashboard();
  if (view === 'orders')    loadOrders();
  if (view === 'inventory') loadInventory();
}

function router() {
  const hash = window.location.hash.slice(1) || 'dashboard';
  if (PROTECTED.includes(hash) && !S.pinVerified) {
    navigate('dashboard');
    showPinModal(() => { window.location.hash = '#' + hash; });
    return;
  }
  navigate(hash);
}
window.addEventListener('hashchange', router);

    return;
  }

  ct.innerHTML = `
    <div class="product-list" id="product-list"></div>
    <div id="cart-section" style="display:none">
      <div class="cart-summary" id="cart-summary"></div>
      <div class="customer-form">
        <div class="cart-title">주문자 정보</div>
        <div class="form-group">
          <label class="form-label">이름 *</label>
          <input class="form-input" id="cname" type="text" placeholder="홍길동" autocomplete="name">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">연락처 *</label>
          <input class="form-input" id="cphone" type="tel" placeholder="010-0000-0000" inputmode="tel">
        </div>
      </div>
      <div class="form-group mt-16">
        <label class="form-label">메모 (선택)</label>
        <input class="form-input" id="cnotes" type="text" placeholder="픽업 시간 등 남기실 말씀">
      </div>
      <button class="btn btn-primary btn-full" id="submit-btn"
        style="height:54px;font-size:16px;margin-top:8px;border-radius:var(--radius)"
        onclick="submitOrder()">주문하기</button>

  `;

function renderProductList() {
  const ct = document.getElementById('product-list');
  if (!ct) return;
  ct.innerHTML = S.products.map(p => {
    const qty    = S.cart[p.id] || 0;
    const maxQty = Math.min(CONFIG.maxQtyPerItem, p.stock);
    const out    = p.stock <= 0;
    return `
      <div class="product-card ${out ? 'sold-out' : ''}">
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          ${p.variant ? `<div class="product-variant">${p.variant}</div>` : ''}
          <div class="product-price">${krw(p.price)}</div>
          <div style="margin-top:5px">${stockBadge(p.stock, p.initial_stock)}</div>
        </div>
        <div class="qty-stepper">
          <button class="qty-btn" onclick="updateCart('${p.id}',-1)" ${qty===0?'disabled':''}>−</button>
          <div class="qty-display">${qty}</div>
          <button class="qty-btn" onclick="updateCart('${p.id}',1)"  ${out||qty>=maxQty?'disabled':''}>+</button>
        </div>
      </div>`;
  }).join('');
}

function updateCart(id, delta) {
  const p   = S.products.find(p => p.id === id);
  if (!p) return;
  const cur = S.cart[id] || 0;
  const nxt = Math.max(0, Math.min(cur + delta, CONFIG.maxQtyPerItem, p.stock));
  if (nxt === 0) delete S.cart[id]; else S.cart[id] = nxt;
  renderProductList();
  updateCartSection();
}

function updateCartSection() {
  const items = Object.entries(S.cart).filter(([,q]) => q > 0);
  const sec   = document.getElementById('cart-section');
  const sum   = document.getElementById('cart-summary');
  if (!sec || !sum) return;
  if (!items.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  let total = 0;
  const rows = items.map(([id,qty]) => {
    const p = S.products.find(p => p.id === id);
    if (!p) return '';
    const sub = p.price * qty; total += sub;
    return `<div class="cart-item">
      <span>${p.name}${p.variant ? ' · ' + p.variant : ''} &times;${qty}</span>
      <span class="font-bold">${krw(sub)}</span>
    </div>`;
  }).join('');
  sum.innerHTML = `
    <div class="cart-title">🛍 주문 내역</div>
    ${rows}
    <div class="cart-total"><span>합계</span><span class="total-amount">${krw(total)}</span></div>`;
}

async function submitOrder() {
  const name  = document.getElementById('cname')?.value?.trim();
  const phone = document.getElementById('cphone')?.value?.trim();
  const notes = document.getElementById('cnotes')?.value?.trim();
  if (!name)  { toast('이름을 입력하세요','error'); return; }
  if (!phone) { toast('연락처를 입력하세요','error'); return; }
  const items = Object.entries(S.cart).filter(([,q])=>q>0).map(([id,qty]) => {
    const p = S.products.find(p => p.id === id);
    return { product_id: id, product_name: p.name, variant: p.variant||'', qty, unit_price: p.price };
  });
  if (!items.length) { toast('상품을 선택하세요','error'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '처리 중...';

  try {
    const { data, error } = await sb.rpc('place_order', {
      p_customer_name: name, p_customer_phone: phone,
      p_items: items, p_notes: notes || null,
    });
    if (error) throw error;
    if (!data.success) throw new Error(data.error);
    showOrderSuccess(name, items, data.total, data.order_id);
    S.cart = {};
  } catch(e) {
    toast('주문 실패: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '주문하기';
  }
}

// ── DASHBOARD ─────────────────────────────────────────
async function loadDashboard() {
  try {
    const [pr, or] = await Promise.all([
      sb.from('products').select('*').order('created_at'),
      sb.from('orders').select('id,total_amount,created_at'),
    ]);
    S.products = pr.data || [];
    S.orders   = or.data || [];
    renderDashboard();
    subscribeDashboard();
  } catch(e) {
    document.getElementById('dashboard-products').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

function renderDashboard() {
  const totalOrders  = S.orders.length;
  const totalRevenue = S.orders.reduce((s,o) => s+(o.total_amount||0), 0);
  const soldOut      = S.products.filter(p => p.stock<=0).length;
  const available    = S.products.length - soldOut;

  document.getElementById('dashboard-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">총 주문수</div>
      <div class="stat-value">${totalOrders}<span style="font-size:16px;font-weight:400;color:var(--text2)"> 건</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">총 매출</div>
      <div class="stat-value" style="font-size:22px">${krw(totalRevenue)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">판매 가능 상품</div>
      <div class="stat-value">${available}<span style="font-size:16px;font-weight:400;color:var(--text2)">/${S.products.length}</span></div>
      <div class="stat-sub">종</div>
    </div>`;

  if (!S.products.length) {
    document.getElementById('dashboard-products').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📦</div><p>등록된 상품이 없습니다.<br>재고관리에서 상품을 추가하세요.</p></div>';
    return;
  }

  document.getElementById('dashboard-products').innerHTML = S.products.map(p => {
    const pct = p.initial_stock>0 ? Math.round(p.stock/p.initial_stock*100) : 0;
    const cls = stockClass(p.stock, p.initial_stock);
    return `
      <div class="dp-card ${p.stock<=0?'sold-out':''}">
        <div class="dp-name">${p.name}</div>
        ${p.variant ? `<div class="dp-variant">${p.variant}</div>` : ''}
        <div class="dp-stock-row">
          <div class="dp-stock-num" style="color:${stockColor(cls)}">${p.stock}</div>
          <div class="dp-stock-initial">/ ${p.initial_stock}</div>
        </div>
        <div class="stock-bar-wrap"><div class="stock-bar-fill ${cls}" style="width:${pct}%"></div></div>
        <div style="margin-top:10px">${stockBadge(p.stock, p.initial_stock)}</div>
      </div>`;
  }).join('');

  document.getElementById('last-updated').textContent = '방금 업데이트';
}

function subscribeDashboard() {
  const ch = sb.channel('dash')
    .on('postgres_changes',{event:'*',schema:'public',table:'products'}, loadDashboard)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'orders'}, loadDashboard)
    .subscribe();
  S.channels.push(ch);
}

          <div>
            ${items.map(i=>`

                <span>${krw(i.unit_price*i.qty)}</span>
              </div>`).join('')}

          ${o.notes ? `<div style="font-size:13px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--bg2)">📝 ${o.notes}</div>` : ''}

  }
  ct.innerHTML = `
    <div style="overflow-x:auto">
    <table class="product-table">
      <thead><tr>
        <th>바코드</th><th>상품명</th><th>옵션</th><th>판매가</th>
        <th>현재 재고</th><th>초기 재고</th><th>판매율</th>
        <th>판매 여부</th><th>액션</th>
      </tr></thead>
      <tbody>
        ${products.map(p => {
          const sold = p.initial_stock > 0 ? Math.round((p.initial_stock-p.stock)/p.initial_stock*100) : 0;
          const soldCls = sold>=80?'badge-red':sold>=50?'badge-amber':'badge-green';
          return `
            <tr>
              <td style="font-size:12px;color:var(--text3)">${p.barcode||'—'}</td>
              <td><strong>${p.name}</strong></td>
              <td>${p.variant||'—'}</td>
              <td>${krw(p.price)}</td>
              <td>
                <input class="stock-edit" type="number" min="0" value="${p.stock}"

              <td>${p.initial_stock}</td>
              <td><span class="badge ${soldCls}">${sold}%</span></td>
              <td>
                <label class="toggle">
                  <input type="checkbox" ${p.is_available?'checked':''}
                    onchange="toggleAvail('${p.id}',this.checked)">
                  <span class="toggle-slider"></span>
                </label>
              </td>
              <td>
                <div class="flex gap-6">
                  <button class="btn btn-ghost btn-sm" onclick="openProductModal('${p.id}')">수정</button>
                  <button class="btn btn-ghost btn-sm" style="color:var(--red)"
                    onclick="deleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')">삭제</button>
                </div>
              </td>
            </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;
}

async function updateStock(id, val) {
  const stock = parseInt(val);
  if (isNaN(stock)||stock<0) return;
  const { error } = await sb.from('products').update({stock}).eq('id',id);
  error ? toast('재고 업데이트 실패: '+error.message,'error')
        : toast('재고가 업데이트되었습니다','success');
}

async function toggleAvail(id, val) {
  const { error } = await sb.from('products').update({is_available:val}).eq('id',id);
  if (error) { toast('업데이트 실패','error'); loadInventory(); }
  else toast(val ? '판매 활성화' : '판매 중지');
}

function openProductModal(id = null) {
  const modal = document.getElementById('product-modal');
  const title = document.getElementById('pmodal-title');
  if (id) {
    const p = S.products.find(p=>p.id===id);
    if (!p) return;
    title.textContent = '상품 수정';
    document.getElementById('pmodal-id').value      = p.id;
    document.getElementById('pmodal-name').value    = p.name;
    document.getElementById('pmodal-variant').value = p.variant||'';
    document.getElementById('pmodal-price').value   = p.price;
    document.getElementById('pmodal-stock').value   = p.stock;
  } else {
    title.textContent = '상품 추가';
    ['pmodal-id','pmodal-name','pmodal-variant','pmodal-price','pmodal-stock']
      .forEach(i => document.getElementById(i).value = '');
  }
  modal.classList.remove('hidden');
}
function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); }

async function saveProduct() {
  const id      = document.getElementById('pmodal-id').value;
  const name    = document.getElementById('pmodal-name').value.trim();
  const variant = document.getElementById('pmodal-variant').value.trim();
  const price   = parseInt(document.getElementById('pmodal-price').value);
  const stock   = parseInt(document.getElementById('pmodal-stock').value);
  if (!name)              { toast('상품명을 입력하세요','error'); return; }
  if (!price||price<=0)   { toast('올바른 가격을 입력하세요','error'); return; }
  if (isNaN(stock)||stock<0) { toast('올바른 재고를 입력하세요','error'); return; }

  if (id) {
    const { error } = await sb.from('products').update({name,variant:variant||null,price,stock}).eq('id',id);
    if (error) { toast('수정 실패: '+error.message,'error'); return; }
    toast('상품이 수정되었습니다','success');
  } else {
    const { error } = await sb.from('products')
      .insert({name, variant:variant||null, price, stock, initial_stock:stock, is_available:true});
    if (error) { toast('추가 실패: '+error.message,'error'); return; }
    toast('상품이 추가되었습니다','success');
  }
  closeProductModal();
  loadInventory();
}

async function deleteProduct(id, name) {
  if (!confirm(`"${name}" 을(를) 삭제하시겠습니까?`)) return;
  const { error } = await sb.from('products').delete().eq('id',id);
  error ? toast('삭제 실패','error') : (toast('삭제되었습니다'), loadInventory());
}


// ── SEARCH / FILTER ───────────────────────────────────
function filterInventory(q) {
  if (!q) { loadInventory(); return; }
  const kw = q.toLowerCase();
  const filtered = S.products.filter(p =>
    (p.name||'').toLowerCase().includes(kw) ||
    (p.variant||'').toLowerCase().includes(kw) ||
    (p.barcode||'').toLowerCase().includes(kw)
  );
  renderInventoryTable(filtered);
}

function filterOrders(q) {
  if (!q) { renderOrdersList(S.orders); return; }
  const kw = q.toLowerCase();
  const filtered = S.orders.filter(o => {
    const items = Array.isArray(o.items) ? o.items : (typeof o.items === 'string' ? JSON.parse(o.items) : []);
    const itemMatch = items.some(i =>
      (i.product_name||'').toLowerCase().includes(kw) ||
      (i.barcode||'').toLowerCase().includes(kw)
    );
    return (o.customer_name||'').toLowerCase().includes(kw) ||
           (o.customer_phone||'').toLowerCase().includes(kw) ||
           itemMatch;
  });
  renderOrdersList(filtered);
}

// ── EXCEL UPLOAD ───────────────────────────────────────
let uploadData = [];

function handleExcelUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      // 첫 행(헤더) 제외, 빈 행 제거
      // 컬럼 자동 감지: 바코드 컬럼 있으면 5열, 없으면 4열
      const firstRow = rows[1] || [];
      const hasBarcodeCol = firstRow.length >= 5;
      uploadData = rows.slice(1).filter(r => r[0] || r[1] || r[2]).map(r => {
        if (hasBarcodeCol) {
          return {
            barcode: String(r[0]||'').trim() || null,
            name:    String(r[1]||'').trim(),
            variant: String(r[2]||'').trim().replace('—','') || null,
            price:   parseInt(r[3]) || 0,
            stock:   parseInt(r[4]) || 0,
          };
        } else {
          return {
            barcode: null,
            name:    String(r[0]||'').trim(),
            variant: String(r[1]||'').trim().replace('—','') || null,
            price:   parseInt(r[2]) || 0,
            stock:   parseInt(r[3]) || 0,
          };
        }
      }).filter(r => r.name);

      if (!uploadData.length) { toast('상품 데이터가 없습니다','error'); return; }

      // 미리보기 렌더
      document.getElementById('upload-count').textContent =
        `총 ${uploadData.length}개 상품 · 가격 미입력 항목은 0원으로 등록됩니다`;
      const tbody = document.getElementById('upload-tbody');
      tbody.innerHTML = uploadData.map(p => `
        <tr>
          <td>${p.barcode||'—'}</td>
          <td>${p.name}</td>
          <td>${p.variant||'—'}</td>
          <td style="text-align:center">${p.price ? p.price.toLocaleString()+'원' : '<span style="color:var(--text3)">미입력</span>'}</td>
          <td style="text-align:center">${p.stock}</td>
        </tr>`).join('');
      document.getElementById('upload-preview').style.display = 'block';
      document.getElementById('upload-preview').scrollIntoView({behavior:'smooth'});
    } catch(err) {
      toast('파일 읽기 실패: ' + err.message, 'error');
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function cancelUpload() {
  uploadData = [];
  document.getElementById('upload-preview').style.display = 'none';
}

async function confirmUpload() {
  if (!uploadData.length) return;
  const btn = document.querySelector('#upload-preview .btn-primary');
  btn.disabled = true;
  btn.textContent = '등록 중...';

  const inserts = uploadData.map(p => ({
    barcode: p.barcode || null,
    name: p.name,
    variant: p.variant,
    price: p.price,
    stock: p.stock,
    initial_stock: p.stock,
    is_available: true,
  }));

  // 50개씩 나눠서 insert (Supabase 제한 대비)
  const chunkSize = 50;
  let errorMsg = null;
  for (let i = 0; i < inserts.length; i += chunkSize) {
    const chunk = inserts.slice(i, i + chunkSize);
    const { error } = await sb.from('products').insert(chunk);
    if (error) { errorMsg = error.message; break; }
  }

  btn.disabled = false;
  btn.textContent = '✓ Supabase에 등록';

  if (errorMsg) {
    toast('등록 실패: ' + errorMsg, 'error');
  } else {
    toast(`✅ ${uploadData.length}개 상품이 등록되었습니다!`, 'success');
    cancelUpload();
    loadInventory();
  }
}

// ── Start ──────────────────────────────────────────────
router();
