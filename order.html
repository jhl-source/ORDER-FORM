<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>likalika 팝업스토어 사전주문</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #FAF9F6;
      --bg2: #F0EEE9;
      --surface: #FFFFFF;
      --border: #E5E1D8;
      --text: #1A1A1A;
      --text2: #6B6560;
      --text3: #A09890;
      --accent: #C8452A;
      --accent-light: #F7EBE8;
      --green: #2E7D52;
      --green-bg: #E8F5EE;
      --amber: #A06A10;
      --amber-bg: #FBF3E3;
      --red: #B03020;
      --red-bg: #FAEAE8;
      --gray: #9E9890;
      --gray-bg: #EEECE8;
      --radius: 14px;
      --radius-sm: 9px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --font: 'Noto Sans KR', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    .order-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 20px 24px; text-align: center; position: sticky; top: 0; z-index: 10;
    }
    .brand { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .subtitle { font-size: 14px; color: var(--text2); margin-top: 4px; }

    /* ── LAYOUT ── */
    .container { max-width: 640px; margin: 0 auto; padding: 24px 16px 80px; }

    /* ── CATEGORY ── */
    .category-title {
      font-size: 13px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin: 28px 0 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── PRODUCT CARD ── */
    .product-list { display: flex; flex-direction: column; gap: 10px; }
    .product-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.15s;
    }
    .product-card.selected { border-color: var(--accent); background: var(--accent-light); }
    .product-card.sold-out { opacity: 0.45; }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
    .product-variant { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .product-price { font-size: 14px; font-weight: 700; color: var(--accent); margin-top: 5px; }
    .product-stock { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; margin-top: 4px; }
    .stock-green { background: var(--green-bg); color: var(--green); }
    .stock-amber { background: var(--amber-bg); color: var(--amber); }
    .stock-red   { background: var(--red-bg);   color: var(--red); }
    .stock-gray  { background: var(--gray-bg);  color: var(--gray); }

    /* ── QTY STEPPER ── */
    .qty-stepper { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; }
    .qty-btn {
      width: 36px; height: 36px; border: none; background: var(--bg2);
      cursor: pointer; font-size: 18px; color: var(--text);
      display: flex; align-items: center; justify-content: center; transition: background 0.15s;
    }
    .qty-btn:hover:not(:disabled) { background: var(--border); }
    .qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .qty-display { width: 40px; text-align: center; font-size: 15px; font-weight: 700; background: white; }

    /* ── CART BAR (하단 고정) ── */
    .cart-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--accent); color: white;
      padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
      font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      transition: all 0.2s; z-index: 100;
    }
    .cart-bar.hidden { transform: translateY(100%); }
    .cart-bar-count { background: white; color: var(--accent); border-radius: 100px; padding: 2px 10px; font-size: 13px; font-weight: 700; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: flex-end; z-index: 200;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-height: 90vh; overflow-y: auto;
      padding: 24px 20px 40px;
    }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 100px; margin: 0 auto 20px; }
    .modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 20px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-family: var(--font); font-size: 15px;
      color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }

    /* ── CART SUMMARY ── */
    .cart-item-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--bg2); }
    .cart-item-row:last-child { border-bottom: none; }
    .cart-total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; margin-top: 6px; border-top: 2px solid var(--border); font-weight: 700; font-size: 16px; }
    .cart-total-amount { color: var(--accent); font-size: 20px; }

    /* ── BUTTON ── */
    .btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 15px; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 16px; font-weight: 700;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-secondary { background: var(--bg2); color: var(--text); margin-top: 10px; }

    /* ── SUCCESS ── */
    .success-screen { text-align: center; padding: 48px 20px; }
    .success-icon { width: 72px; height: 72px; background: var(--green-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 20px; }
    .success-title { font-size: 24px; font-weight: 700; }
    .success-sub { color: var(--text2); margin-top: 8px; font-size: 15px; }
    .receipt { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: left; margin-top: 24px; }

    /* ── STATES ── */
    .loading-state { text-align: center; padding: 80px 20px; color: var(--text2); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--bg2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 15px; }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--text); color: white; padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; z-index: 9999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--red); }
    #toast.success { background: var(--green); }
  </style>
</head>
<body>

<div class="order-header">
  <div class="brand">likalika</div>
  <div class="subtitle">팝업스토어 사전주문</div>
</div>

<div class="container" id="main-content">
  <div class="loading-state"><div class="spinner"></div><div>상품 불러오는 중...</div></div>
</div>

<!-- 하단 장바구니 바 -->
<div class="cart-bar hidden" id="cart-bar" onclick="openCartModal()">
  <span>🛍 장바구니 보기</span>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="cart-bar-total"></span>
    <span class="cart-bar-count" id="cart-bar-count">0</span>
  </div>
</div>

<!-- 장바구니 / 주문 모달 -->
<div class="modal-overlay hidden" id="cart-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const CONFIG = {
  supabaseUrl: 'https://ynvzkldgalvasuapusrl.supabase.co',
  supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InludnprbGRnYWx2YXN1YXB1c3JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDA2MzksImV4cCI6MjA5MTcxNjYzOX0.MaZLGSzwoG9gBtsZ1mCvswXqpaRjhGLTdRxJsuFg5xM',
  maxQtyPerItem: 5,
};

const sb = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

let products = [];
let cart = {}; // { productId: qty }

function krw(n) { return (n||0).toLocaleString('ko-KR') + '원'; }

let toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

// ── 상품 로드 ──────────────────────────────────────────
async function loadProducts() {
  try {
    const { data, error } = await sb
      .from('products').select('*')
      .eq('is_available', true)
      .order('name');
    if (error) throw error;
    products = data || [];
    renderProducts();
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="empty-state">⚠️ 상품을 불러오지 못했습니다.<br><small style="color:var(--text3)">${e.message}</small></div>`;
  }
}

// ── 상품 렌더 (카테고리 묶기) ──────────────────────────
function renderProducts() {
  if (!products.length) {
    document.getElementById('main-content').innerHTML =
      '<div class="empty-state">📦 현재 판매 가능한 상품이 없습니다.</div>';
    return;
  }

  // 상품명으로 카테고리 묶기
  const categories = {};
  products.forEach(p => {
    if (!categories[p.name]) categories[p.name] = [];
    categories[p.name].push(p);
  });

  let html = '';
  Object.entries(categories).forEach(([catName, items]) => {
    html += `<div class="category-title">${catName}</div><div class="product-list">`;
    items.forEach(p => {
      const qty = cart[p.id] || 0;
      const maxQty = Math.min(CONFIG.maxQtyPerItem, p.stock);
      const out = p.stock <= 0;
      let stockBadge = '';
      if (out) stockBadge = '<span class="product-stock stock-gray">품절</span>';
      else if (p.stock / (p.initial_stock||p.stock) > 0.5) stockBadge = '<span class="product-stock stock-green">재고 충분</span>';
      else if (p.stock / (p.initial_stock||p.stock) > 0.2) stockBadge = '<span class="product-stock stock-amber">소량 남음</span>';
      else stockBadge = '<span class="product-stock stock-red">마감 임박</span>';

      html += `
        <div class="product-card ${out?'sold-out':''} ${qty>0?'selected':''}" id="card-${p.id}">
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            ${p.variant ? `<div class="product-variant">${p.variant}</div>` : ''}
            <div class="product-price">${krw(p.price)}</div>
            ${stockBadge}
          </div>
          <div class="qty-stepper">
            <button class="qty-btn" onclick="updateCart('${p.id}',-1)" ${qty===0?'disabled':''}>−</button>
            <div class="qty-display" id="qty-${p.id}">${qty}</div>
            <button class="qty-btn" onclick="updateCart('${p.id}',1)" ${out||qty>=maxQty?'disabled':''}>+</button>
          </div>
        </div>`;
    });
    html += '</div>';
  });

  document.getElementById('main-content').innerHTML = html;
  updateCartBar();
}

// ── 장바구니 업데이트 ──────────────────────────────────
function updateCart(id, delta) {
  const p = products.find(p => p.id === id);
  if (!p) return;
  const cur = cart[id] || 0;
  const nxt = Math.max(0, Math.min(cur + delta, CONFIG.maxQtyPerItem, p.stock));
  if (nxt === 0) delete cart[id]; else cart[id] = nxt;

  // 수량 표시 업데이트
  const qtyEl = document.getElementById('qty-' + id);
  if (qtyEl) qtyEl.textContent = nxt;

  // 카드 선택 상태
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('selected', nxt > 0);

  // 버튼 상태
  const btns = card?.querySelectorAll('.qty-btn');
  if (btns) {
    btns[0].disabled = nxt === 0;
    btns[1].disabled = p.stock <= 0 || nxt >= Math.min(CONFIG.maxQtyPerItem, p.stock);
  }

  updateCartBar();
}

function getCartItems() {
  return Object.entries(cart).filter(([,q]) => q > 0).map(([id, qty]) => {
    const p = products.find(p => p.id === id);
    return { ...p, qty, subtotal: p.price * qty };
  });
}

function getCartTotal() {
  return getCartItems().reduce((s, i) => s + i.subtotal, 0);
}

function getCartCount() {
  return Object.values(cart).reduce((s, q) => s + q, 0);
}

function updateCartBar() {
  const count = getCartCount();
  const bar = document.getElementById('cart-bar');
  bar.classList.toggle('hidden', count === 0);
  document.getElementById('cart-bar-count').textContent = count;
  document.getElementById('cart-bar-total').textContent = count > 0 ? krw(getCartTotal()) : '';
}

// ── 모달 ──────────────────────────────────────────────
function openCartModal() {
  renderCartModal();
  document.getElementById('cart-modal').classList.remove('hidden');
}

function closeCartModal() {
  document.getElementById('cart-modal').classList.add('hidden');
}

document.getElementById('cart-modal').addEventListener('click', function(e) {
  if (e.target === this) closeCartModal();
});

function renderCartModal() {
  const items = getCartItems();
  const total = getCartTotal();

  let rows = items.map(i => `
    <div class="cart-item-row">
      <span>${i.name}${i.variant ? ' · ' + i.variant : ''} ×${i.qty}</span>
      <span style="font-weight:700">${krw(i.subtotal)}</span>
    </div>`).join('');

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">🛍 주문 내역 확인</div>
    <div style="margin-bottom:20px">
      ${rows}
      <div class="cart-total-row">
        <span>합계</span>
        <span class="cart-total-amount">${krw(total)}</span>
      </div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin-bottom:20px">
    <div class="modal-title" style="font-size:16px">주문자 정보</div>
    <div class="form-group">
      <label class="form-label">이름 *</label>
      <input class="form-input" id="cname" type="text" placeholder="홍길동" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">연락처 *</label>
      <input class="form-input" id="cphone" type="tel" placeholder="010-0000-0000" inputmode="tel">
    </div>
    <div class="form-group" style="margin-bottom:24px">
      <label class="form-label">메모 (선택)</label>
      <input class="form-input" id="cnotes" type="text" placeholder="픽업 시간 등 남기실 말씀">
    </div>
    <button class="btn btn-primary" id="submit-btn" onclick="submitOrder()">주문하기</button>
    <button class="btn btn-secondary" onclick="closeCartModal()">계속 담기</button>
  `;
}

// ── 주문 제출 ──────────────────────────────────────────
async function submitOrder() {
  const name  = document.getElementById('cname')?.value?.trim();
  const phone = document.getElementById('cphone')?.value?.trim();
  const notes = document.getElementById('cnotes')?.value?.trim();

  if (!name)  { toast('이름을 입력하세요', 'error'); return; }
  if (!phone) { toast('연락처를 입력하세요', 'error'); return; }

  const items = getCartItems().map(i => ({
    product_id: i.id,
    product_name: i.name,
    variant: i.variant || '',
    qty: i.qty,
    unit_price: i.price,
  }));

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '처리 중...';

  try {
    const { data, error } = await sb.rpc('place_order', {
      p_customer_name: name,
      p_customer_phone: phone,
      p_items: items,
      p_notes: notes || null,
    });
    if (error) throw error;
    if (!data.success) throw new Error(data.error);

    closeCartModal();
    cart = {};
    updateCartBar();
    showSuccess(name, items, data.total, data.order_id);
  } catch(e) {
    toast('주문 실패: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '주문하기';
  }
}

// ── 주문 완료 화면 ─────────────────────────────────────
function showSuccess(name, items, total, orderId) {
  const shortId = orderId.split('-')[0].toUpperCase();
  document.getElementById('main-content').innerHTML = `
    <div class="success-screen">
      <div class="success-icon">✓</div>
      <div class="success-title">주문 완료!</div>
      <div class="success-sub">${name}님, 주문이 접수되었습니다 🐾</div>
      <div class="receipt">
        <div style="display:flex;justify-content:space-between;margin-bottom:14px">
          <span style="font-weight:700">주문번호</span>
          <span style="font-family:monospace;color:var(--accent);font-weight:700">#${shortId}</span>
        </div>
        ${items.map(i=>`
          <div class="cart-item-row">
            <span>${i.product_name}${i.variant ? ' · ' + i.variant : ''} ×${i.qty}</span>
            <span style="font-weight:700">${krw(i.unit_price*i.qty)}</span>
          </div>`).join('')}
        <div class="cart-total-row">
          <span>총 결제금액</span>
          <span class="cart-total-amount">${krw(total)}</span>
        </div>
      </div>
      <p style="color:var(--text3);font-size:13px;margin-top:20px">현장에서 결제 후 픽업해주세요</p>
      <button class="btn btn-secondary" style="margin-top:20px" onclick="location.reload()">추가 주문하기</button>
    </div>`;
}

// ── 시작 ──────────────────────────────────────────────
loadProducts();
</script>
</body>
</html>
