<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>likalika 팝업스토어 사전주문</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#FAF9F6;--bg2:#F0EEE9;--surface:#FFFFFF;--border:#E5E1D8;
      --text:#1A1A1A;--text2:#6B6560;--text3:#A09890;
      --accent:#C8452A;--accent-light:#F7EBE8;
      --green:#2E7D52;--green-bg:#E8F5EE;
      --amber:#A06A10;--amber-bg:#FBF3E3;
      --red:#B03020;--red-bg:#FAEAE8;
      --gray:#9E9890;--gray-bg:#EEECE8;
      --radius:14px;--radius-sm:9px;
      --font:'Noto Sans KR',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}

    .order-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;text-align:center;position:sticky;top:0;z-index:50;}
    .brand{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-0.5px;}
    .subtitle{font-size:13px;color:var(--text2);margin-top:3px;}

    .cat-tabs-wrap{position:sticky;top:57px;z-index:40;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .cat-tabs-wrap::-webkit-scrollbar{display:none;}
    .cat-tabs{display:flex;padding:0 12px;white-space:nowrap;}
    .cat-tab{padding:11px 14px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;flex-shrink:0;user-select:none;}
    .cat-tab:hover{color:var(--text);}
    .cat-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .cat-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--bg2);color:var(--text3);border-radius:100px;font-size:10px;font-weight:700;min-width:17px;height:17px;padding:0 4px;margin-left:3px;}
    .cat-tab.active .cat-badge{background:var(--accent-light);color:var(--accent);}

    .container{max-width:640px;margin:0 auto;padding:12px 14px 100px;}

    .group-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding:18px 2px 8px;border-bottom:1px solid var(--border);margin-bottom:8px;}
    .group-title:first-child{padding-top:10px;}

    .product-list{display:flex;flex-direction:column;gap:7px;margin-bottom:4px;}
    .product-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 15px;display:flex;align-items:center;gap:12px;transition:border-color .15s,background .15s;}
    .product-card.selected{border-color:var(--accent);background:var(--accent-light);}
    .product-card.sold-out{opacity:.4;pointer-events:none;}
    .product-info{flex:1;min-width:0;}
    .product-name{font-size:14px;font-weight:600;}
    .product-variant{font-size:12px;color:var(--text2);margin-top:1px;}
    .product-price{font-size:14px;font-weight:700;color:var(--accent);margin-top:4px;}
    .sbadge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:11px;font-weight:600;margin-top:3px;}
    .sg{background:var(--green-bg);color:var(--green);}
    .sa{background:var(--amber-bg);color:var(--amber);}
    .sr{background:var(--red-bg);color:var(--red);}
    .sx{background:var(--gray-bg);color:var(--gray);}

    .qty-stepper{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0;}
    .qty-btn{width:36px;height:36px;border:none;background:var(--bg2);cursor:pointer;font-size:18px;color:var(--text);display:flex;align-items:center;justify-content:center;transition:background .15s;}
    .qty-btn:hover:not(:disabled){background:var(--border);}
    .qty-btn:disabled{opacity:.3;cursor:not-allowed;}
    .qty-num{width:36px;text-align:center;font-size:15px;font-weight:700;background:white;}

    .cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--accent);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 -4px 20px rgba(0,0,0,.15);transform:translateY(100%);transition:transform .25s ease;z-index:100;}
    .cart-bar.show{transform:translateY(0);}
    .cart-bar-r{display:flex;align-items:center;gap:10px;}
    .cart-bubble{background:white;color:var(--accent);border-radius:100px;padding:2px 10px;font-size:13px;font-weight:700;}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.show{opacity:1;pointer-events:auto;}
    .modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:640px;margin:0 auto;max-height:92vh;overflow-y:auto;padding:6px 20px 44px;transform:translateY(30px);transition:transform .25s ease;}
    .modal-overlay.show .modal{transform:translateY(0);}
    .modal-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:12px auto 18px;}
    .modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}

    .sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border);}
    .form-group{margin-bottom:12px;}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px;}
    .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;}
    .form-input:focus{border-color:var(--accent);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

    .order-row{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid var(--bg2);}
    .order-row:last-child{border-bottom:none;}
    .order-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:12px;margin-top:4px;border-top:2px solid var(--border);font-weight:700;font-size:16px;}
    .order-total-amt{color:var(--accent);font-size:20px;}

    .btn{display:flex;align-items:center;justify-content:center;width:100%;padding:14px;border-radius:var(--radius-sm);font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;border:none;transition:all .15s;margin-top:10px;}
    .btn-primary{background:var(--accent);color:white;}
    .btn-primary:hover{filter:brightness(1.08);}
    .btn-primary:disabled{opacity:.45;cursor:not-allowed;filter:none;}
    .btn-ghost{background:var(--bg2);color:var(--text2);}

    .success-wrap{text-align:center;padding:60px 20px;}
    .success-circle{width:70px;height:70px;background:var(--green-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 18px;}
    .success-title{font-size:22px;font-weight:700;}
    .success-sub{color:var(--text2);font-size:14px;margin-top:6px;}
    .receipt{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;text-align:left;margin-top:22px;}
    .receipt-row{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;color:var(--text2);border-bottom:1px solid var(--bg2);}
    .receipt-row:last-child{border-bottom:none;}

    .loading-wrap{text-align:center;padding:80px 20px;color:var(--text2);}
    .spinner{width:30px;height:30px;border:3px solid var(--bg2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:white;padding:11px 22px;border-radius:100px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    #toast.error{background:var(--red);}
    #toast.success{background:var(--green);}

    @media(max-width:480px){.form-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<div class="order-header">
  <div class="brand">likalika</div>
  <div class="subtitle">팝업스토어 사전주문</div>
</div>

<div class="cat-tabs-wrap" id="cat-tabs-wrap" style="display:none">
  <div class="cat-tabs" id="cat-tabs"></div>
</div>

<div class="container" id="main-content">
  <div class="loading-wrap"><div class="spinner"></div>상품 불러오는 중...</div>
</div>

<div class="cart-bar" id="cart-bar" onclick="openModal()">
  <span>🛍 장바구니 보기</span>
  <div class="cart-bar-r">
    <span id="cart-bar-total"></span>
    <span class="cart-bubble" id="cart-bar-count">0</span>
  </div>
</div>

<div class="modal-overlay" id="cart-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const CONFIG = {
  supabaseUrl: 'https://ynvzkldgalvasuapusrl.supabase.co',
  supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InludnprbGRnYWx2YXN1YXB1c3JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDA2MzksImV4cCI6MjA5MTcxNjYzOX0.MaZLGSzwoG9gBtsZ1mCvswXqpaRjhGLTdRxJsuFg5xM',
  maxQtyPerItem: 5,
};

// 카테고리 정의
const CATS = [
  { key:'all',       label:'전체',      icon:'🛍' },
  { key:'bag',       label:'가방/캐리어', icon:'👜', names:['쿠션백/쿠션 세트 리뉴얼','[크림] 쿠션백 크로스끈','[블랙] 쿠션백 크로스끈','[토프] 쿠션백 크로스끈','튼튼 반달 슬링백','슬링백 쿠션 커버','[화이트_M] 뉴 슬링백 _ 쿠션 솜 속통','[화이트_L] 뉴 슬링백 _ 쿠션 솜 속통','티코어 백팩','베이직 산책가방'] },
  { key:'stroller',  label:'유모차',    icon:'🍼', names:['올데이 라이트 일체형 유모차 2세대','올데이 플러스 일체형 유모차','유모차 가드 컴포터'] },
  { key:'clothes',   label:'의류',      icon:'👕', names:['멜로우 후드 티셔츠','플로럴 레이어드 티셔츠','프레피 카라 티셔츠','팔레트 스트라이프 티셔츠','시그니처 슬리브리스','안티버그 쿨 슬리브리스','포인트 슬리브리스','빼꼼 케이프 빕'] },
  { key:'walk',      label:'산책용품',  icon:'🐾', names:['깅엄 체크 하네스_X자형','깅엄 체크 목줄','깅엄 체크 핸즈프리 리드줄','깅엄 체크 풉백 홀더','아이스 쿨 스카프','휴대용 원터치 산책 물통','휴대용 실리콘 냠냠 간식 파우치'] },
  { key:'character', label:'캐릭터',   icon:'🎀', names:['캐릭터 입체 파우치'] },
];

const sb = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
let products = [], cart = {}, currentCat = 'all';

function krw(n) { return (n||0).toLocaleString('ko-KR')+'원'; }

let toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show'+(type?' '+type:'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.className='', 3000);
}

function sbadge(p) {
  if (p.stock<=0) return '<span class="sbadge sx">품절</span>';
  const r = p.initial_stock>0 ? p.stock/p.initial_stock : 1;
  if (r>.5) return '<span class="sbadge sg">재고 충분</span>';
  if (r>.2) return '<span class="sbadge sa">소량 남음</span>';
  return '<span class="sbadge sr">마감 임박</span>';
}

async function loadProducts() {
  try {
    const { data, error } = await sb.from('products').select('*').eq('is_available',true).order('name');
    if (error) throw error;
    products = data || [];
    renderAll();
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div style="text-align:center;padding:80px 20px;color:var(--text3)">⚠️ 상품을 불러오지 못했습니다.<br><small>${e.message}</small></div>`;
  }
}

function catProducts(key) {
  if (key==='all') return products;
  const c = CATS.find(c=>c.key===key);
  return c?.names ? products.filter(p=>c.names.includes(p.name)) : products;
}

function renderAll() {
  if (!products.length) {
    document.getElementById('main-content').innerHTML =
      '<div style="text-align:center;padding:80px 20px;color:var(--text3)">📦 현재 판매 가능한 상품이 없습니다.</div>';
    return;
  }
  document.getElementById('cat-tabs-wrap').style.display = 'block';
  document.getElementById('cat-tabs').innerHTML = CATS.map(c => {
    const cnt = catProducts(c.key).length;
    if (!cnt && c.key!=='all') return '';
    return `<div class="cat-tab ${c.key===currentCat?'active':''}" data-key="${c.key}" onclick="switchCat('${c.key}',this)">
      ${c.icon} ${c.label}<span class="cat-badge">${cnt}</span>
    </div>`;
  }).join('');
  renderProducts();
}

function switchCat(key, el) {
  currentCat = key;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderProducts() {
  const list = catProducts(currentCat);
  const groups = {};
  list.forEach(p => { (groups[p.name] = groups[p.name]||[]).push(p); });

  let html = '';
  Object.entries(groups).forEach(([gname, items]) => {
    html += `<div class="group-title">${gname}</div><div class="product-list">`;
    items.forEach(p => {
      const qty = cart[p.id]||0, max = Math.min(CONFIG.maxQtyPerItem, p.stock), out = p.stock<=0;
      html += `<div class="product-card${out?' sold-out':''}${qty>0?' selected':''}" id="card-${p.id}">
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          ${p.variant?`<div class="product-variant">${p.variant}</div>`:''}
          <div class="product-price">${krw(p.price)}</div>
          ${sbadge(p)}
        </div>
        <div class="qty-stepper">
          <button class="qty-btn" onclick="updateCart('${p.id}',-1)" ${qty===0?'disabled':''}>−</button>
          <div class="qty-num" id="qty-${p.id}">${qty}</div>
          <button class="qty-btn" onclick="updateCart('${p.id}',1)" ${out||qty>=max?'disabled':''}>+</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('main-content').innerHTML = html;
}

function updateCart(id, delta) {
  const p = products.find(p=>p.id===id); if (!p) return;
  const cur = cart[id]||0;
  const nxt = Math.max(0, Math.min(cur+delta, CONFIG.maxQtyPerItem, p.stock));
  if (nxt===0) delete cart[id]; else cart[id]=nxt;
  const qe = document.getElementById('qty-'+id); if (qe) qe.textContent=nxt;
  const ce = document.getElementById('card-'+id);
  if (ce) {
    ce.classList.toggle('selected', nxt>0);
    const btns = ce.querySelectorAll('.qty-btn');
    if(btns[0]) btns[0].disabled=nxt===0;
    if(btns[1]) btns[1].disabled=p.stock<=0||nxt>=Math.min(CONFIG.maxQtyPerItem,p.stock);
  }
  updateCartBar();
}

function cartItems() {
  return Object.entries(cart).filter(([,q])=>q>0).map(([id,qty])=>{
    const p=products.find(p=>p.id===id);
    return {...p,qty,subtotal:p.price*qty};
  });
}
function cartTotal() { return cartItems().reduce((s,i)=>s+i.subtotal,0); }
function cartCount() { return Object.values(cart).reduce((s,q)=>s+q,0); }

function updateCartBar() {
  const n = cartCount();
  document.getElementById('cart-bar').classList.toggle('show',n>0);
  document.getElementById('cart-bar-count').textContent = n;
  document.getElementById('cart-bar-total').textContent = n>0?krw(cartTotal()):'';
}

function openModal() {
  renderModal();
  document.getElementById('cart-modal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal() {
  document.getElementById('cart-modal').classList.remove('show');
  document.body.style.overflow='';
}
document.getElementById('cart-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('cart-modal')) closeModal();
});

function renderModal() {
  const items = cartItems(), total = cartTotal();
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">🛍 주문서 작성</div>
    <div style="background:var(--bg2);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:4px">
      ${items.map(i=>`<div class="order-row"><span style="color:var(--text2)">${i.name}${i.variant?' · '+i.variant:''} ×${i.qty}</span><span style="font-weight:700">${krw(i.subtotal)}</span></div>`).join('')}
      <div class="order-total-row"><span>합계</span><span class="order-total-amt">${krw(total)}</span></div>
    </div>

    <div class="sec-title">주문자 정보</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">이름 *</label>
        <input class="form-input" id="f-name" type="text" placeholder="홍길동" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">연락처 *</label>
        <input class="form-input" id="f-phone" type="tel" placeholder="010-0000-0000" inputmode="tel">
      </div>
    </div>

    <div class="sec-title">배송지 정보</div>
    <div class="form-group">
      <label class="form-label">우편번호</label>
      <input class="form-input" id="f-zip" type="text" placeholder="우편번호 (선택)" inputmode="numeric" style="max-width:160px">
    </div>
    <div class="form-group">
      <label class="form-label">주소 *</label>
      <input class="form-input" id="f-addr1" type="text" placeholder="시/도, 구/군, 도로명">
    </div>
    <div class="form-group">
      <label class="form-label">상세 주소</label>
      <input class="form-input" id="f-addr2" type="text" placeholder="동/호수 등 상세 주소">
    </div>

    <div class="sec-title">기타</div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">메모 (선택)</label>
      <input class="form-input" id="f-notes" type="text" placeholder="픽업 시간, 요청사항 등">
    </div>

    <button class="btn btn-primary" id="submit-btn" onclick="submitOrder()">주문하기</button>
    <button class="btn btn-ghost" onclick="closeModal()">계속 담기</button>
  `;
}

async function submitOrder() {
  const name  = document.getElementById('f-name')?.value?.trim();
  const phone = document.getElementById('f-phone')?.value?.trim();
  const zip   = document.getElementById('f-zip')?.value?.trim();
  const addr1 = document.getElementById('f-addr1')?.value?.trim();
  const addr2 = document.getElementById('f-addr2')?.value?.trim();
  const notes = document.getElementById('f-notes')?.value?.trim();

  if (!name)  { toast('이름을 입력하세요','error'); return; }
  if (!phone) { toast('연락처를 입력하세요','error'); return; }
  if (!addr1) { toast('주소를 입력하세요','error'); return; }

  const address = [zip?`[${zip}]`:'', addr1, addr2].filter(Boolean).join(' ');
  const fullNotes = [address, notes].filter(Boolean).join(' | ');

  const items = cartItems().map(i=>({
    product_id:i.id, product_name:i.name,
    variant:i.variant||'', qty:i.qty, unit_price:i.price,
  }));

  const btn = document.getElementById('submit-btn');
  btn.disabled=true; btn.textContent='처리 중...';

  try {
    const { data, error } = await sb.rpc('place_order',{
      p_customer_name:name, p_customer_phone:phone,
      p_items:items, p_notes:fullNotes||null,
    });
    if (error) throw error;
    if (!data.success) throw new Error(data.error);
    closeModal(); cart={}; updateCartBar();
    showSuccess(name, phone, address, items, data.total, data.order_id);
  } catch(e) {
    toast('주문 실패: '+e.message,'error');
    btn.disabled=false; btn.textContent='주문하기';
  }
}

function showSuccess(name, phone, address, items, total, orderId) {
  const sid = orderId.split('-')[0].toUpperCase();
  document.getElementById('cat-tabs-wrap').style.display='none';
  document.getElementById('cart-bar').classList.remove('show');
  document.getElementById('main-content').innerHTML = `
    <div class="success-wrap">
      <div class="success-circle">✓</div>
      <div class="success-title">주문 완료!</div>
      <div class="success-sub">${name}님, 주문이 접수되었습니다 🐾</div>
      <div class="receipt">
        <div class="receipt-row"><span>주문번호</span><strong style="font-family:monospace;color:var(--accent)">#${sid}</strong></div>
        <div class="receipt-row"><span>주문자</span><strong>${name} · ${phone}</strong></div>
        <div class="receipt-row" style="flex-direction:column;gap:3px;align-items:flex-start"><span>배송지</span><strong style="margin-top:2px">${address}</strong></div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bg2)">
          ${items.map(i=>`<div class="order-row"><span>${i.product_name}${i.variant?' · '+i.variant:''} ×${i.qty}</span><span style="font-weight:700">${krw(i.unit_price*i.qty)}</span></div>`).join('')}
          <div class="order-total-row"><span>총 결제금액</span><span class="order-total-amt">${krw(total)}</span></div>
        </div>
      </div>
      <p style="color:var(--text3);font-size:13px;margin-top:18px">현장에서 결제 후 픽업해주세요</p>
      <button class="btn btn-ghost" style="margin-top:14px;max-width:200px;margin-left:auto;margin-right:auto" onclick="location.reload()">추가 주문하기</button>
    </div>`;
}

loadProducts();
</script>
</body>
</html>
